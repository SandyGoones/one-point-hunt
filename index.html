<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16231A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>One Point Hunt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#16231A;
    --bg-elev:#1E2F22;
    --card:#EFE6D0;
    --card-dark:#D9CBA3;
    --ink:#2B2118;
    --cream:#F4EFE2;
    --accent:#C2542E;
    --gold:#C99A3E;
    --line:rgba(244,239,226,0.12);
    --status-vegan:#8FAE86;
    --status-scout:#C9B27A;
    --status-crockett:#C99A3E;
    --status-crazyhorse:#C2542E;
    --status-assassin:#A23A3A;
    color-scheme: dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{font-family:'Inter',sans-serif;color:var(--cream);-webkit-tap-highlight-color:transparent;}
  button{font-family:inherit;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:90px;position:relative;}

  .topbar{padding:20px 16px 16px;border-bottom:1px solid var(--line);}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;min-width:0;}
  .brand-mark{color:var(--accent);font-size:10px;line-height:1;}
  .brand-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:0.04em;color:var(--cream);}
  .brand-sub{font-size:12px;color:rgba(244,239,226,0.55);margin-top:3px;}
  .season-switcher select{background:var(--bg-elev);color:var(--cream);border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-family:'IBM Plex Mono',monospace;font-size:12px;flex-shrink:0;}
  .archived-note{margin-top:10px;font-size:12px;color:rgba(244,239,226,0.7);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .archived-back{background:none;border:1px solid var(--line);color:var(--cream);font-size:11px;padding:4px 9px;border-radius:6px;cursor:pointer;}

  .content{padding:20px 16px 8px;}

  .section-head{margin-bottom:18px;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
  .section-head h1{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;margin:0;color:var(--cream);}

  .board-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
  .board-row{display:flex;align-items:center;gap:12px;background:var(--bg-elev);border:1px solid var(--line);border-radius:10px;padding:13px 14px;}
  .rank{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:600;width:26px;flex-shrink:0;}
  .hunter-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
  .hunter-name{font-weight:600;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .hunter-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
  .hunter-meta{font-size:12px;color:rgba(244,239,226,0.5);flex-shrink:0;}
  .points{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:18px;color:var(--accent);display:flex;align-items:baseline;gap:3px;flex-shrink:0;}
  .points small{font-size:10px;color:rgba(244,239,226,0.5);}

  .tier-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;}
  .tier-chip{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--line);font-weight:600;}

  .status-vegan{color:var(--status-vegan);}
  .status-boy-scout{color:var(--status-scout);}
  .status-davy-crockett{color:var(--status-crockett);}
  .status-crazy-horse{color:var(--status-crazyhorse);}
  .status-assassin{color:var(--status-assassin);}

  .status-banner{font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:0.04em;text-align:center;margin-bottom:2px;}
  .status-next{font-size:12px;color:rgba(244,239,226,0.55);text-align:center;margin-bottom:18px;}

  .log-form{display:flex;flex-direction:column;gap:14px;}
  .field-label{display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:rgba(244,239,226,0.75);}
  .field-label .optional{font-weight:400;color:rgba(244,239,226,0.4);text-transform:none;font-size:11px;margin-left:4px;}
  .field-label input{font-family:'Inter',sans-serif;font-size:15px;padding:11px 12px;border-radius:8px;border:1px solid var(--line);background:var(--bg-elev);color:var(--cream);width:100%;}
  .field-label input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  input[type=file]{padding:10px;font-size:13px;}
  input[type=file]::-webkit-file-upload-button, input[type=file]::file-selector-button{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-family:'Inter',sans-serif;font-weight:600;margin-right:10px;cursor:pointer;}
  .photo-preview img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:4px;display:block;}
  .primary-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Oswald',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.03em;text-transform:uppercase;cursor:pointer;}
  .primary-btn:active{transform:scale(0.97);}
  .primary-btn:disabled{opacity:0.6;}
  .log-status{font-size:13px;color:var(--accent);min-height:16px;}
  .ghost-btn{margin-top:18px;width:100%;background:none;border:1px solid var(--line);color:rgba(244,239,226,0.7);padding:12px;border-radius:10px;font-weight:600;cursor:pointer;}

  .tag-grid{display:flex;flex-direction:column;gap:16px;}
  .tag-card{position:relative;background:var(--card);color:var(--ink);border-radius:4px 16px 4px 16px;padding:14px 16px 16px 30px;box-shadow:0 6px 16px rgba(0,0,0,0.3);}
  .tag-card:nth-child(odd){transform:rotate(-0.6deg);}
  .tag-card:nth-child(even){transform:rotate(0.5deg);}
  .tag-card::before{content:'';position:absolute;left:11px;top:16px;width:9px;height:9px;border-radius:50%;background:var(--bg);box-shadow:0 0 0 2px var(--card-dark) inset;}
  .tag-delete{position:absolute;top:8px;right:8px;background:rgba(43,33,24,0.08);border:none;color:var(--ink);width:26px;height:26px;border-radius:50%;font-size:13px;cursor:pointer;}
  .tag-photo{margin-bottom:10px;border-radius:8px;overflow:hidden;background:var(--card-dark);}
  .tag-photo img{width:100%;max-height:260px;object-fit:cover;display:block;}
  .tag-photo-placeholder{display:flex;align-items:center;justify-content:center;height:110px;font-size:32px;color:rgba(43,33,24,0.3);}
  .tag-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .tag-animal{font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:0.02em;}
  .stamp{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);box-shadow:0 0 0 3px rgba(194,84,46,0.15) inset;color:var(--accent);font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.04em;transform:rotate(-7deg);flex-shrink:0;}
  .tag-meta{font-size:12px;color:rgba(43,33,24,0.6);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
  .tag-note{font-size:13px;margin-top:8px;font-style:italic;color:rgba(43,33,24,0.75);}

  .empty-state{text-align:center;padding:60px 20px;color:rgba(244,239,226,0.55);}
  .empty-title{font-family:'Oswald',sans-serif;font-size:18px;color:var(--cream);margin-bottom:6px;}
  .empty-body{font-size:14px;}

  .gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:22px;text-align:center;}
  .gate-brand .brand-title{font-size:26px;}
  .gate-brand .brand-sub{margin-top:6px;}
  .gate-illustration{width:230px;max-width:78vw;margin:0 auto;}
  .gate-illustration svg{display:block;width:100%;height:auto;}
  .gate-photo-frame{position:relative;width:230px;max-width:78vw;margin:0 auto;}
  .gate-photo-frame .moose-photo{display:block;width:100%;border-radius:6px 26px 6px 26px;border:5px solid var(--card);box-shadow:0 14px 28px rgba(0,0,0,0.45);transform:rotate(-1.4deg);}
  .gate-photo-frame .mouse-photo-overlay{position:absolute;width:27%;aspect-ratio:1/1;top:62%;left:3%;border-radius:50%;border:3px solid var(--card);box-shadow:0 6px 14px rgba(0,0,0,0.4);object-fit:cover;}
  .gate-stamp{position:absolute;top:-12px;right:-12px;background:var(--card);}
  .gate-form{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;}
  .gate-form .field-label{text-align:left;}
  .gate-foot{font-size:12px;color:rgba(244,239,226,0.45);max-width:300px;}

  .me-stats{display:flex;gap:12px;margin-bottom:20px;}

  .avatar-circle{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;overflow:hidden;background:var(--gold);color:var(--ink);font-family:'Oswald',sans-serif;font-weight:700;flex-shrink:0;}
  .avatar-circle img{width:100%;height:100%;object-fit:cover;display:block;}
  .avatar-small{width:30px;height:30px;font-size:13px;}
  .avatar-large{width:88px;height:88px;font-size:34px;}
  .me-avatar-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px;}
  .avatar-edit{position:relative;display:inline-block;cursor:pointer;}
  .avatar-edit-badge{position:absolute;bottom:-2px;right:-2px;background:var(--accent);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid var(--bg);}
  .avatar-edit-label{font-size:12px;color:rgba(244,239,226,0.5);}
  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;}
  .me-stat{flex:1;background:var(--bg-elev);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center;}
  .me-stat-num{display:block;font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;color:var(--gold);}
  .me-stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:rgba(244,239,226,0.5);}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--bg-elev);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
  .nav-btn{flex:1;background:none;border:none;color:rgba(244,239,226,0.55);display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;font-size:11px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;cursor:pointer;}
  .nav-btn.active{color:var(--accent);}
  .nav-icon{font-size:18px;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);max-width:90%;background:var(--bg-elev);border:1px solid var(--accent);color:var(--cream);padding:10px 16px;border-radius:30px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:50;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .loading{display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(244,239,226,0.5);font-family:'IBM Plex Mono',monospace;font-size:13px;}

  .fallback-banner{background:#3a2616;color:#F4D9A8;border-bottom:1px solid var(--accent);font-size:12px;line-height:1.4;padding:10px 16px;text-align:center;}

  .setup-copy{max-width:300px;text-align:center;font-size:14px;line-height:1.5;color:rgba(244,239,226,0.8);}
  .setup-code{font-family:'IBM Plex Mono',monospace;background:var(--bg-elev);border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:14px;font-size:13px;word-break:break-all;color:var(--gold);text-align:center;}
  .setup-help{font-size:12px;color:rgba(244,239,226,0.6);margin-top:8px;text-align:center;max-width:280px;}
  .setup-error{color:var(--accent);font-size:13px;text-align:center;margin-top:14px;max-width:280px;line-height:1.4;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

      state.registry = reg;
      return reg;
    });
  }
  function loadEntries(){
    return loadRegistry().then(function(reg){ return reg.entries; });
  }
  function saveAvatar(name, dataUrl){
    return loadRegistry().then(function(reg){
      reg.avatars[name] = dataUrl;
      return saveRegistry(reg);
    });
  }

  // ---------- utils ----------
  function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }
  function fmtDate(iso){
    if (!iso) return '';
    var parts = iso.split('-').map(Number);
    var dt = new Date(parts[0], parts[1] - 1, parts[2]);
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }
  function compressImage(file, maxDim, quality){
    maxDim = maxDim || 900; quality = quality || 0.6;
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(e){
        var img = new Image();
        img.onload = function(){
          var width = img.width, height = img.height;
          if (width > height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
          else if (height >= width && height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
          var canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function computeLeaderboard(entries){
    var map = {};
    entries.forEach(function(e){
      if (!map[e.name]) map[e.name] = { name: e.name, points: 0, species: {} };
      map[e.name].points += 1;
      map[e.name].species[e.animal.trim().toLowerCase()] = true;
    });
    return Object.keys(map).map(function(k){
      var row = map[k];
      return { name: row.name, points: row.points, speciesCount: Object.keys(row.species).length };
    }).sort(function(a, b){ return b.points - a.points || a.name.localeCompare(b.name); });
  }

  // ---------- seasons ----------
  function currentSeason(){ return String(new Date().getFullYear()); }
  function entrySeason(e){
    if (e.date){ var parts = e.date.split('-'); if (parts[0]) return parts[0]; }
    return String(new Date(e.ts || Date.now()).getFullYear());
  }
  function activeSeason(){ return state.viewSeason || currentSeason(); }
  function availableSeasons(){
    var set = {};
    set[currentSeason()] = true;
    state.entries.forEach(function(e){ set[entrySeason(e)] = true; });
    return Object.keys(set).sort(function(a, b){ return Number(b) - Number(a); });
  }
  function entriesForSeason(season){
    return state.entries.filter(function(e){ return entrySeason(e) === season; });
  }

  // ---------- status tiers ----------
  var STATUS_TIERS = [
    { min: 0, max: 0, name: 'Vegan' },
    { min: 1, max: 5, name: 'Boy Scout' },
    { min: 6, max: 10, name: 'Davy Crockett' },
    { min: 11, max: 15, name: 'Crazy Horse' },
    { min: 16, max: Infinity, name: 'Assassin' }
  ];
  function statusSlug(name){ return name.toLowerCase().replace(/\s+/g, '-'); }
  function statusIndexFor(points){
    for (var i = 0; i < STATUS_TIERS.length; i++){
      if (points >= STATUS_TIERS[i].min && points <= STATUS_TIERS[i].max) return i;
    }
    return STATUS_TIERS.length - 1;
  }
  function statusFor(points){ return STATUS_TIERS[statusIndexFor(points)]; }

  function avatarContent(name){
    var url = state.registry && state.registry.avatars && state.registry.avatars[name];
    if (url) return '<img data-avatar-name="' + escapeHtml(name) + '" src="' + url + '" alt="">';
    var initial = (name || '?').trim().charAt(0).toUpperCase() || '?';
    return '<span class="avatar-initial" data-avatar-name="' + escapeHtml(name) + '">' + escapeHtml(initial) + '</span>';
  }
  function renderAvatar(name, sizeClass){
    return '<span class="avatar-circle ' + sizeClass + '">' + avatarContent(name) + '</span>';
  }
  function cssAttrEscape(str){
    return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"');
  }
  function updateAvatarDom(name, dataUrl){
    var sel = '[data-avatar-name="' + cssAttrEscape(name) + '"]';
    document.querySelectorAll(sel).forEach(function(el){
      if (el.tagName === 'IMG') { el.src = dataUrl; }
      else { el.outerHTML = '<img data-avatar-name="' + escapeHtml(name) + '" src="' + dataUrl + '" alt="">'; }
    });
  }
  function handleAvatarUpload(file, name){
    return compressImage(file, 300, 0.75).then(function(dataUrl){
      return saveAvatar(name, dataUrl).then(function(){ return dataUrl; });
    });
  }

  // ---------- render helpers ----------
  function emptyState(title, body){

  function renderBoard(){
    var season = activeSeason();

  function renderTagCard(e){

  function renderFeed(){
    var season = activeSeason();
    var seasonEntries = entriesForSeason(season);
    var eyebrow = season === currentSeason() ? 'Every tag from camp' : 'Tags from the ' + season + ' season';
    if (seasonEntries.length === 0) return '<div class="section-head"><div class="eyebrow">' + eyebrow + '</div><h1>The Feed</h1></div>' +

  function renderMe(){
    var season = activeSeason();

    var speciesSet = {};
    mine.forEach(function(e){ speciesSet[e.animal.trim().toLowerCase()] = true; });
    var points = mine.length;

      ? (next.min - points) + ' more point' + ((next.min - points) === 1 ? '' : 's') + ' to reach ' + next.name

      : '';

  // ---------- render + hydrate ----------
  function render(){
    var app = document.getElementById('app');
    if (state.loading){
      app.innerHTML = '<div class="loading">Loading camp...</div>';
      return;
    }
    app.innerHTML = state.profile ? renderShell() : renderNameGate();
  }

  // ---------- toast ----------
  var toastTimer;
  function toast(msg){
    var el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2600);
  }

  // ---------- actions ----------
  function handleNameSubmit(formEl){
    var name = formEl.name.value.trim();
    if (!name) return;
    state.profile = { name: name };
    loadEntries().then(function(entries){
      state.entries = entries;
      state.tab = 'board';
      render();
    }).catch(function(err){
      state.entries = [];
      state.tab = 'board';
      state.loadError = true;
      state.loadErrorMessage = (err && err.message) || 'Unknown error';
      render();
      toast("Couldn't reach the scoreboard \u2014 check your connection.");
    });
  }
  function setSubmitting(isSubmitting){
    var btn = document.getElementById('log-submit');
    if (btn){ btn.disabled = isSubmitting; btn.textContent = isSubmitting ? 'Saving...' : 'Tag it \u2014 +1 point'; }
  }
  function showStatus(msg){
    var el = document.getElementById('log-status');
    if (el) el.textContent = msg;
  }
  function handleLogSubmit(formEl){
    var animal = formEl.animal.value.trim();
    var date = formEl.date.value || todayStr();
    var note = formEl.note.value.trim();
    var file = formEl.photo.files[0];
    if (!animal){ showStatus('Add the animal you tagged.'); return; }
    showStatus('');
    setSubmitting(true);
    var id = genId();
    var photoPromise = file ? compressImage(file) : Promise.resolve(null);
    photoPromise.then(function(dataUrl){
      return loadRegistry().then(function(reg){
        var entry = { id: id, name: state.profile.name, animal: animal, date: date, note: note, photo: dataUrl, ts: Date.now() };
        reg.entries.push(entry);
        return saveRegistry(reg).then(function(){ return reg.entries; });
      });
    }).then(function(entries){
      state.entries = entries;
      state.tab = 'feed';
      render();
      toast('Logged! +1 point for ' + state.profile.name + '.');
    }).catch(function(){
      showStatus("Couldn't save that tag \u2014 check your connection and try again.");
    }).finally(function(){
      setSubmitting(false);
    });
  }
  function handleDelete(id){
    var entry = state.entries.find(function(e){ return e.id === id; });
    if (!entry || entry.name !== state.profile.name) return;
    if (!confirm('Remove this tag?')) return;
    loadRegistry().then(function(reg){
      reg.entries = reg.entries.filter(function(e){ return e.id !== id; });
      return saveRegistry(reg).then(function(){ return reg.entries; });
    }).then(function(entries){
      state.entries = entries;
      render();
    }).catch(function(){
      toast("Couldn't remove that tag \u2014 try again.");
    });
  }
  function handleSwitchHunter(){
    if (!confirm('Switch hunter on this device?')) return;
    state.profile = null;
    render();
  }

  // ---------- delegated listeners (bound once) ----------
  document.addEventListener('DOMContentLoaded', function(){
    var app = document.getElementById('app');
    app.addEventListener('click', function(e){
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      if (action === 'set-tab'){ state.tab = btn.dataset.tab; render(); }
      else if (action === 'delete-entry'){ handleDelete(btn.dataset.id); }
      else if (action === 'switch-hunter'){ handleSwitchHunter(); }
      else if (action === 'back-to-current'){ state.viewSeason = null; render(); }
    });
    app.addEventListener('submit', function(e){
      e.preventDefault();
      if (e.target.id === 'log-form') handleLogSubmit(e.target);
      else if (e.target.id === 'name-form') handleNameSubmit(e.target);
    });
    app.addEventListener('change', function(e){
      if (e.target && e.target.id === 'photo-input'){
        var file = e.target.files[0];
        var preview = document.getElementById('photo-preview');
        if (!preview) return;
        if (file){
          var reader = new FileReader();
          reader.onload = function(ev){ preview.innerHTML = '<img src="' + ev.target.result + '" alt="Preview">'; };
          reader.readAsDataURL(file);
        } else {
          preview.innerHTML = '';
        }
      } else if (e.target && e.target.id === 'avatar-input'){
        var meFile = e.target.files[0];
        if (!meFile || !state.profile) return;
        var meName = state.profile.name;
        handleAvatarUpload(meFile, meName).then(function(dataUrl){
          updateAvatarDom(meName, dataUrl);
          toast('Profile photo updated!');
        }).catch(function(){
          toast("Couldn't save that photo \u2014 try again.");
        });
      } else if (e.target && e.target.id === 'season-select'){
        state.viewSeason = e.target.value === currentSeason() ? null : e.target.value;
        render();
      }
    });
    init();
  });

  function init(){
    state.loading = true;
    render();
    loadEntries().then(function(entries){
      state.entries = entries;
      state.loading = false;
      state.loadError = false;
      render();
    }).catch(function(err){
      state.entries = [];
      state.loading = false;
      state.loadError = true;
      state.loadErrorMessage = (err && err.message) || 'Unknown error';
      render();
    });
  }
})();
</script>
</body>
</html>
